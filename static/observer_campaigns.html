<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Наблюдатель</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
            --bg: #000000;
            --surface: #070707;
            --surface2: #0b0b0b;
            --stroke: #242424;
            --stroke2: #303030;
            --text: #f8fafc;
            --muted: rgba(248, 250, 252, .66);
            --accent: #94a3b8;
            --accent2: #64748b;
            --onAccent: #111827;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 14px;
        }

        .top-card {
            background: linear-gradient(180deg, #060606, #000000);
            border: 1px solid rgba(148, 163, 184, .55);
            border-radius: 14px;
            padding: 12px 14px;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, .6), 0 10px 30px rgba(0, 0, 0, .55);
            margin-bottom: 20px;
        }

        .top-title {
            color: var(--accent);
            font-weight: 900;
            font-size: 20px;
        }

        .top-sub {
            color: var(--muted);
            font-size: 14px;
            margin-top: 4px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.10em;
            opacity: 0.7;
            margin: 10px 2px 8px;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px;
            border-radius: 16px;
            background: linear-gradient(180deg, var(--surface), var(--surface2));
            border: 1px solid var(--stroke);
            min-height: 58px;
            cursor: pointer;
        }

        .item:active {
            transform: scale(0.99);
        }

        .item-title {
            font-size: 16px;
            font-weight: 800;
        }

        .item-sub {
            margin-top: 3px;
            font-size: 12px;
            color: var(--muted);
        }

        .pill {
            font-size: 12px;
            padding: 9px 12px;
            border-radius: 999px;
            border: 1px solid var(--stroke);
            background: rgba(148, 163, 184, .12);
            color: var(--text);
            white-space: nowrap;
        }

        .pill.active {
            background: rgba(34, 197, 94, .12);
        }

        .btn {
            height: 54px;
            padding: 0 16px;
            border-radius: 16px;
            border: 1px solid rgba(0, 0, 0, .55);
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: var(--onAccent);
            font-size: 14px;
            font-weight: 900;
            letter-spacing: .06em;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 14px;
        }

        .btn:active {
            transform: scale(0.99);
        }

        .hint {
            font-size: 12px;
            color: var(--muted);
            margin: 6px 2px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="top-card">
        <div class="top-title">👁️ Наблюдатель</div>
        <div class="top-sub">Кампании, за которыми ты следишь</div>
    </div>

    <div class="section-title">Кампании</div>
    <div id="campaignList" class="list">
        <div class="loading">Загрузка...</div>
    </div>

    <div class="hint">Нажми на кампанию, чтобы увидеть активные схватки</div>

    <button class="btn" onclick="goHome()">🏠 Главное меню</button>

    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = "";

        function authHeaders() {
            const initData = tg?.initData || "";
            return initData ? { "Authorization": "tma " + initData } : {};
        }

        async function apiGet(path) {
            const res = await fetch(API_BASE + path, { headers: { ...authHeaders() } });
            if (!res.ok) {
                const text = await res.text();
                console.error('API Error:', res.status, text);
                throw new Error(`HTTP ${res.status}: ${text}`);
            }
            return await res.json();
        }

        async function loadCampaigns() {
            try {
                const campaigns = await apiGet("/campaigns/observer/my");
                console.log('Campaigns loaded:', campaigns);
                renderCampaigns(campaigns);
            } catch (e) {
                console.error('Load campaigns error:', e);
                document.getElementById('campaignList').innerHTML = '<div class="item"><div class="item-title">Ошибка загрузки: ' + e.message + '</div></div>';
            }
        }

        function renderCampaigns(campaigns) {
            const list = document.getElementById('campaignList');
            list.innerHTML = '';

            if (!campaigns || campaigns.length === 0) {
                list.innerHTML = `
                    <div class="item">
                        <div>
                            <div class="item-title">Пусто</div>
                            <div class="item-sub">Ты пока не принял ни одного приглашения</div>
                        </div>
                        <div class="pill">Нет кампаний</div>
                    </div>
                `;
                return;
            }

            campaigns.forEach(c => {
                const row = document.createElement('div');
                row.className = 'item';
                row.onclick = () => openCampaign(c.id, c.name);

                const left = document.createElement('div');
                const title = document.createElement('div');
                title.className = 'item-title';
                title.innerText = c.name;

                const sub = document.createElement('div');
                sub.className = 'item-sub';
                sub.innerText = `ID: ${c.id}`;

                left.appendChild(title);
                left.appendChild(sub);

                const pill = document.createElement('div');
                pill.className = 'pill';
                pill.innerText = 'Смотреть';

                row.appendChild(left);
                row.appendChild(pill);
                list.appendChild(row);
            });
        }

        async function openCampaign(id, name) {
            try {
                console.log('Opening campaign:', id, name);
                const encounters = await apiGet(`/campaigns/${id}/encounters/active`);
                console.log('Encounters loaded:', encounters);
                
                if (encounters.length === 0) {
                    alert(`В кампании "${name}" нет активных схваток`);
                    return;
                }
                
                // Всегда открываем страницу выбора схваток
                window.location.href = `/static/observer_encounters.html?campaign_id=${id}&campaign_name=${encodeURIComponent(name)}`;
            } catch (e) {
                console.error('Open campaign error:', e);
                alert('Ошибка загрузки: ' + e.message);
            }
        }

        function goHome() {
            window.location.href = '/static/index.html';
        }
        if (tg && tg.ready) tg.ready();
        loadCampaigns();
    </script>
</body>
</html>
